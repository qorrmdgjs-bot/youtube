# Font configuration for senior-friendly subtitles and thumbnails

subtitle:
  primary_font: "NanumSquareRoundEB"
  fallback_font: "NanumGothicBold"
  font_size: 52
  font_color: "&HFFFFFF"       # White (ASS format BGR)
  outline_color: "&H000000"    # Black outline
  outline_width: 3
  shadow_color: "&H80000000"   # Semi-transparent black
  shadow_depth: 2
  margin_bottom: 60            # Pixels from bottom
  alignment: 2                 # Bottom center (ASS alignment)
  line_spacing: 12
  max_lines: 2
  max_chars_per_line: 18
  bold: true

thumbnail:
  title_font: "NanumMyeongjo"
  title_font_size: 72
  title_color: [255, 255, 255]    # White RGB
  title_outline_color: [0, 0, 0]  # Black RGB
  title_outline_width: 4
  subtitle_font: "NanumSquareRoundEB"
  subtitle_font_size: 36
  subtitle_color: [255, 220, 100] # Warm yellow RGB

# Font file paths (relative to assets/fonts/)
font_files:
  NanumSquareRoundEB: "NanumSquareRoundExtraBold.ttf"
  NanumGothicBold: "NanumGothicBold.ttf"
  NanumMyeongjo: "NanumMyeongjo.ttf"
