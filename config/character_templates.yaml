# Character reference image registry.
# Generated by scripts/generate_characters.py via Nano Banana 2.
# Used by stage G — passed as image_input to Nano Banana 2 so the same person
# appears consistently across all scenes.
#
# Schema:
#   <family_type>:
#     era: "1980s-2020s" | "1990s" | "contemporary"
#     description: short note
#     characters:
#       <role>:
#         # Multi-stage form (parent_sacrifice — 30화 시리즈 대상):
#         anchor: <stage_key>            # the canonical/reference stage
#         stages:
#           <stage_key>:
#             image: <path relative to project root>
#             age: <human-readable age>
#         # OR single-stage form (other family types):
#         image: <path>
#         description: <Korean note>

# ─────────────────────────────────────────────────
# parent_sacrifice — 30화 시리즈 단일 가족
# ─────────────────────────────────────────────────
parent_sacrifice:
  era: "1980s–2020s"
  description: "5인 가족 30년 일대기 (시리즈 대상)"
  characters:
    father:
      anchor: middle_40s
      stages:
        middle_40s:
          image: "assets/characters/parent_sacrifice/father_middle_40s.png"
          age: "late 40s, 1990s (IMF 직전/후)"
        # Phase 1.5 신규 — generate_characters.py 실행 후 채워짐:
        # young_30s, elder_60s, elder_70s
    mother:
      anchor: middle_40s
      stages:
        middle_40s:
          image: "assets/characters/parent_sacrifice/mother_middle_40s.png"
          age: "late 30s to early 40s, 1990s"
        # Phase 1.5: young_20s, elder_60s, elder_70s
    son:
      anchor: teen
      stages:
        teen:
          image: "assets/characters/parent_sacrifice/son_teen.png"
          age: "teenager to early 20s, 1990s (화자/주인공)"
        # Phase 1.5: child, young_adult, middle_40s
    older_sister:
      anchor: young_adult
      stages:
        young_adult:
          image: "assets/characters/parent_sacrifice/older_sister_young_adult.png"
          age: "early 20s, 1990s (IMF 때 대학 포기)"
        # Phase 1.5: teen, middle_30s, middle_50s
    younger_sister:
      anchor: child
      stages:
        child:
          image: "assets/characters/parent_sacrifice/younger_sister_child.png"
          age: "10-15 years old, 1990s"
        # Phase 1.5: teen, young_adult, middle_40s

# ─────────────────────────────────────────────────
# 기타 가족 유형 — 단발 영상용 (시리즈 대상 아님, single-stage)
# ─────────────────────────────────────────────────
grandparent_memory:
  era: "1990s"
  description: "조부모와 어린 손주의 1990년대 회상 (단발)"
  characters:
    grandmother:
      image: "assets/characters/grandparent_memory/grandmother.png"
      age: "early 60s (1990s)"
    grandfather:
      image: "assets/characters/grandparent_memory/grandfather.png"
      age: "mid to late 60s (1990s)"
    grandchild:
      image: "assets/characters/grandparent_memory/grandchild.png"
      age: "7-9 years old (1990s)"

couple_growing_old:
