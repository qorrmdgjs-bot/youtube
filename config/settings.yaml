# Global Settings
project:
  name: "가족이야기"
  base_dir: "projects"
  log_dir: "logs"
  asset_dir: "assets"

# Video defaults
video:
  resolution: [1920, 1080]
  fps: 24                       # cinematic feel
  codec: "h264_videotoolbox"   # M3 hardware acceleration
  audio_codec: "aac"
  audio_bitrate: "192k"
  default_duration_sec: 480    # 8 minutes (seniors prefer 8-12min)

# Audio mixing
audio:
  narration_db: -3
  bgm_db: -3               # louder for senior hearing
  fade_in_sec: 1.5
  fade_out_sec: 3.0

# Subtitle (landscape main video 1920x1080)
subtitle:
  font: "NanumSquareRoundEB"
  font_size: 22
  font_color: "white"
  outline_color: "black"
  outline_width: 3
  shadow_offset: 2
  position_y_percent: 85  # bottom 15%
  max_chars_per_line: 18
  max_syllables_per_sec: 3.5

# Shorts (1080x1920 portrait, 60s clips)
shorts:
  target_duration_sec: 60      # ~1 minute per short
  min_duration_sec: 45
  max_duration_sec: 70
  subtitle_font_size: 64       # larger for portrait/mobile readability
  subtitle_margin_v: 240       # bottom margin (px) for portrait
  source_video: "composed.mp4" # use pre-subtitle composed video so we can re-burn larger subs

# Scene
scene:
  min_duration_sec: 3.0
  transition_duration_sec: 0.5
  default_transition: "crossfade"
  ken_burns_zoom_speed: 0.0005
  ken_burns_max_zoom: 1.3

# Thumbnail
thumbnail:
  width: 1280
  height: 720
  title_font: "NanumMyeongjo"
  title_font_size: 96           # large for senior CTR

# API cost limits
cost:
  max_per_video_usd: 12.0
  monthly_budget_usd: 1000.0
  alert_threshold_percent: 80

# LLM
llm:
  model: "claude-sonnet-4-20250514"
  max_tokens: 4096
  temperature: 0.8

# TTS
tts:
  provider: "google"
  voice_female: "ko-KR-Neural2-A"   # Neural2: 더 자연스럽고 감정 표현력 높음
  voice_male: "ko-KR-Neural2-C"
  speaking_rate: 0.92  # 0.88은 너무 느려서 부자연스러움, 0.92가 자연스러운 낭독 속도
  pitch: -0.5           # 너무 낮으면 부자연, 살짝만 낮춤

# Image generation
image:
  provider: "replicate"
  model: "black-forest-labs/flux-1.1-pro"
  width: 1920
  height: 1080
  num_images_per_scene: 1
