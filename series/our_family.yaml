# 시리즈 에피소드 매핑 표 (22화)
# 본 파일은 episode_number → (event, perspective, characters) 매핑만 담당.
# 스토리 본문은 이 파일이 아니라 series/drafts/{son,father,mother}_pov_stories.md를 source-of-truth로 사용.
# 영상 제작 시 pipeline 코드는 다음 흐름으로 동작:
#   1. 이 파일에서 episode N의 metadata + characters 룩업
#   2. perspective에 매핑된 마크다운 파일 열어 "## 사건 {event_idx}: ..." 섹션 추출
#   3. 추출된 마크다운 + series_overview.md를 LLM 프롬프트에 그대로 주입
#   4. characters 매핑은 character_templates.yaml에서 이미지 경로 룩업해 Nano Banana 2 image_input으로 사용

series:
  id: our_family
  title: "우리 가족, 30년"
  family_type: parent_sacrifice
  perspectives: [son, father, mother]
  total_episodes: 22

  drafts_dir: series/drafts
  overview: series_overview.md   # always inject as global context
  pov_files:
    son: son_pov_stories.md
    father: father_pov_stories.md
    mother: mother_pov_stories.md
  # 각 마크다운 파일은 "## 사건 N: <title>" 헤딩으로 섹션 분리.

# ─────────────────────────────────────────────────
# 22 episodes (시간 순 + 시점 순)
# characters: 가족 멤버별 stage (character_templates.yaml의 stage 키와 매칭)
